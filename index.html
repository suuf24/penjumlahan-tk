<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Latihan Berhitung Anak TK</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Comic Sans MS", "Trebuchet MS", Arial, sans-serif;
      background: linear-gradient(135deg, #ffe6f2, #e0f7fa, #fff9c4);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #333;
    }

    .app {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 32px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.15);
      text-align: center;
      overflow: hidden;
    }

    .hidden {
      display: none;
    }

    h1 {
      font-size: clamp(32px, 6vw, 54px);
      color: #ff7aa2;
      margin-bottom: 14px;
      line-height: 1.15;
    }

    h2 {
      font-size: clamp(26px, 5vw, 42px);
      color: #5c7cfa;
      margin-bottom: 18px;
    }

    p {
      font-size: clamp(18px, 4vw, 25px);
      line-height: 1.5;
      margin-bottom: 18px;
    }

    .mascot {
      font-size: clamp(54px, 12vw, 100px);
      margin: 16px 0;
      animation: float 2.5s ease-in-out infinite;
    }

    .btn {
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: bold;
      border-radius: 22px;
      padding: 16px 28px;
      background: #ffb3c6;
      color: #fff;
      box-shadow: 0 8px 0 #ff7aa2;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
      margin: 8px;
    }

    .btn:hover {
      background: #ff9fba;
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #ff7aa2;
    }

    .btn-blue {
      background: #74c0fc;
      box-shadow: 0 8px 0 #4dabf7;
    }

    .btn-blue:hover {
      background: #5cb8ff;
    }

    .btn-green {
      background: #8ce99a;
      box-shadow: 0 8px 0 #51cf66;
    }

    .btn-green:hover {
      background: #74dd83;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .badge {
      background: #fff3bf;
      color: #7950f2;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: clamp(17px, 3vw, 22px);
      font-weight: bold;
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.8);
    }

    .progress-wrap {
      width: 100%;
      height: 18px;
      background: #e9ecef;
      border-radius: 999px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffd43b, #69db7c, #74c0fc);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .question-card {
      background: #f8f9ff;
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 20px;
      border: 4px dashed #d0ebff;
      animation: popIn 0.35s ease;
    }

    .question-text {
      font-size: clamp(24px, 5vw, 38px);
      font-weight: bold;
      color: #364fc7;
      margin-bottom: 18px;
    }

    .objects {
      font-size: clamp(42px, 9vw, 72px);
      line-height: 1.35;
      letter-spacing: 8px;
      margin: 18px 0;
      word-break: break-word;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 20px;
    }

    .choice-btn {
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: clamp(26px, 6vw, 42px);
      font-weight: bold;
      padding: 18px;
      border-radius: 24px;
      background: #e7f5ff;
      color: #1864ab;
      box-shadow: 0 7px 0 #a5d8ff;
      transition: all 0.18s ease;
      min-height: 84px;
    }

    .choice-btn:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.02);
      background: #d0ebff;
    }

    .choice-btn:active:not(:disabled) {
      transform: translateY(4px);
      box-shadow: 0 3px 0 #a5d8ff;
    }

    .choice-btn:disabled {
      cursor: not-allowed;
      opacity: 0.8;
    }

    .correct {
      background: #b2f2bb !important;
      color: #2b8a3e !important;
      box-shadow: 0 7px 0 #69db7c !important;
      animation: happyBounce 0.55s ease;
    }

    .wrong {
      background: #ffe3e3 !important;
      color: #c92a2a !important;
      box-shadow: 0 7px 0 #ffa8a8 !important;
      animation: softShake 0.45s ease;
    }

    .feedback {
      min-height: 52px;
      font-size: clamp(20px, 4vw, 30px);
      font-weight: bold;
      margin: 18px 0;
      color: #ff922b;
    }

    .feedback.good {
      color: #2f9e44;
    }

    .feedback.try {
      color: #f08c00;
    }

    .result-box {
      background: #fff9db;
      border-radius: 28px;
      padding: 26px;
      border: 4px solid #ffe066;
      animation: popIn 0.4s ease;
    }

    .final-score {
      font-size: clamp(44px, 10vw, 86px);
      color: #ff922b;
      font-weight: bold;
      margin: 18px 0;
    }

    .small-note {
      font-size: clamp(16px, 3vw, 21px);
      color: #666;
      margin-top: 12px;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.92);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes happyBounce {
      0%, 100% {
        transform: scale(1);
      }
      40% {
        transform: scale(1.12);
      }
      70% {
        transform: scale(0.96);
      }
    }

    @keyframes softShake {
      0%, 100% {
        transform: translateX(0);
      }
      25% {
        transform: translateX(-5px);
      }
      50% {
        transform: translateX(5px);
      }
      75% {
        transform: translateX(-3px);
      }
    }

    @media (max-width: 520px) {
      .app {
        padding: 20px;
        border-radius: 24px;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .choice-btn {
        min-height: 72px;
      }

      .top-bar {
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <!-- Halaman Awal -->
    <section id="startScreen">
      <h1>Belajar Berhitung</h1>
      <div class="mascot">🐻 ⭐ 🍎</div>
      <p>
        Yuk belajar menghitung angka 1 sampai 9 dengan cara yang seru!
      </p>
      <button class="btn btn-green" onclick="startGame()">Mulai Belajar</button>
      <p class="small-note">Cocok untuk anak pra-TK dan TK</p>
    </section>

    <!-- Halaman Kuis -->
    <section id="quizScreen" class="hidden">
      <div class="top-bar">
        <div class="badge" id="questionNumber">Soal 1 dari 10</div>
        <div class="badge" id="scoreText">Benar: 0</div>
      </div>

      <div class="progress-wrap">
        <div class="progress" id="progressBar"></div>
      </div>

      <div class="question-card" id="questionCard">
        <div class="question-text" id="questionText"></div>
        <div class="objects" id="objectDisplay"></div>
        <div class="choices" id="choices"></div>
      </div>

      <div class="feedback" id="feedback"></div>

      <button id="nextBtn" class="btn btn-blue hidden" onclick="nextQuestion()">
        Soal Berikutnya
      </button>
    </section>

    <!-- Halaman Hasil -->
    <section id="resultScreen" class="hidden">
      <div class="result-box">
        <h2>Selesai!</h2>
        <div class="mascot">🎉 🐱 🌟</div>
        <p>Ini hasil belajarmu hari ini:</p>
        <div class="final-score" id="finalScore">0/10</div>
        <p id="motivationText"></p>
        <button class="btn btn-green" onclick="startGame()">Main Lagi</button>
      </div>
    </section>
  </main>

  <script>
    // ==============================
    // Data dasar aplikasi
    // ==============================
    const totalQuestions = 10;
    const emojis = ["🍎", "⭐", "🐻", "🐱", "🚗", "🍌", "🌸", "🧸", "🍓"];

    let questions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    const startScreen = document.getElementById("startScreen");
    const quizScreen = document.getElementById("quizScreen");
    const resultScreen = document.getElementById("resultScreen");

    const questionNumber = document.getElementById("questionNumber");
    const scoreText = document.getElementById("scoreText");
    const progressBar = document.getElementById("progressBar");
    const questionCard = document.getElementById("questionCard");
    const questionText = document.getElementById("questionText");
    const objectDisplay = document.getElementById("objectDisplay");
    const choices = document.getElementById("choices");
    const feedback = document.getElementById("feedback");
    const nextBtn = document.getElementById("nextBtn");

    const finalScore = document.getElementById("finalScore");
    const motivationText = document.getElementById("motivationText");

    // ==============================
    // Fungsi bantuan
    // ==============================
    function randomNumber(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomItem(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function shuffleArray(array) {
      const copiedArray = [...array];

      for (let i = copiedArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copiedArray[i], copiedArray[j]] = [copiedArray[j], copiedArray[i]];
      }

      return copiedArray;
    }

    function repeatEmoji(emoji, count) {
      return Array(count).fill(emoji).join(" ");
    }

    // Membuat pilihan jawaban dengan angka maksimal 9
    function generateChoices(correctAnswer) {
      const choiceSet = new Set();
      choiceSet.add(correctAnswer);

      while (choiceSet.size < 4) {
        const option = randomNumber(1, 9);
        choiceSet.add(option);
      }

      return shuffleArray([...choiceSet]);
    }

    // ==============================
    // Generator soal acak
    // ==============================
    function generateCountingQuestion() {
      const answer = randomNumber(1, 9);
      const emoji = randomItem(emojis);

      return {
        type: "count",
        text: "Ada berapa gambar ini?",
        visual: repeatEmoji(emoji, answer),
        answer: answer,
        options: generateChoices(answer)
      };
    }

    function generateAdditionQuestion() {
      let firstNumber = randomNumber(1, 8);
      let secondNumber = randomNumber(1, 8);

      // Pastikan hasil penjumlahan maksimal 9
      while (firstNumber + secondNumber > 9) {
        firstNumber = randomNumber(1, 8);
        secondNumber = randomNumber(1, 8);
      }

      const answer = firstNumber + secondNumber;

      return {
        type: "addition",
        text: `${firstNumber} + ${secondNumber} = ?`,
        visual: "🧠 🌟",
        answer: answer,
        options: generateChoices(answer)
      };
    }

    function generateChooseNumberQuestion() {
      const answer = randomNumber(1, 9);
      const emoji = randomItem(emojis);

      return {
        type: "choose",
        text: "Pilih angka yang sama dengan jumlah gambar!",
        visual: repeatEmoji(emoji, answer),
        answer: answer,
        options: generateChoices(answer)
      };
    }

    function generateQuestion() {
      const questionTypes = [
        generateCountingQuestion,
        generateAdditionQuestion,
        generateChooseNumberQuestion
      ];

      const selectedGenerator = randomItem(questionTypes);
      return selectedGenerator();
    }

    function generateQuestionSet() {
      const newQuestions = [];
      const questionKeys = new Set();

      while (newQuestions.length < totalQuestions) {
        const question = generateQuestion();

        // Membantu agar soal dalam satu sesi tidak terlalu sering sama
        const key = `${question.text}-${question.visual}-${question.answer}`;

        if (!questionKeys.has(key)) {
          questionKeys.add(key);
          newQuestions.push(question);
        }
      }

      return newQuestions;
    }

    // ==============================
    // Alur aplikasi
    // ==============================
    function startGame() {
      questions = generateQuestionSet();
      currentQuestionIndex = 0;
      score = 0;
      answered = false;

      startScreen.classList.add("hidden");
      resultScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");

      showQuestion();
    }

    function showQuestion() {
      answered = false;

      const currentQuestion = questions[currentQuestionIndex];

      questionCard.style.animation = "none";
      questionCard.offsetHeight;
      questionCard.style.animation = "popIn 0.35s ease";

      questionNumber.textContent = `Soal ${currentQuestionIndex + 1} dari ${totalQuestions}`;
      scoreText.textContent = `Benar: ${score}`;
      progressBar.style.width = `${(currentQuestionIndex / totalQuestions) * 100}%`;

      questionText.textContent = currentQuestion.text;
      objectDisplay.textContent = currentQuestion.visual;
      feedback.textContent = "";
      feedback.className = "feedback";

      choices.innerHTML = "";

      currentQuestion.options.forEach(option => {
        const button = document.createElement("button");
        button.className = "choice-btn";
        button.textContent = option;
        button.onclick = () => checkAnswer(button, option);
        choices.appendChild(button);
      });

      nextBtn.classList.add("hidden");
    }

    function checkAnswer(selectedButton, selectedAnswer) {
      if (answered) return;

      answered = true;

      const currentQuestion = questions[currentQuestionIndex];
      const allButtons = document.querySelectorAll(".choice-btn");

      allButtons.forEach(button => {
        button.disabled = true;
      });

      if (selectedAnswer === currentQuestion.answer) {
        score++;
        selectedButton.classList.add("correct");
        feedback.textContent = "Hebat! Jawabanmu benar!";
        feedback.classList.add("good");
      } else {
        selectedButton.classList.add("wrong");
        feedback.textContent = "Tidak apa-apa, coba lagi ya!";
        feedback.classList.add("try");

        allButtons.forEach(button => {
          if (Number(button.textContent) === currentQuestion.answer) {
            button.classList.add("correct");
          }
        });
      }

      scoreText.textContent = `Benar: ${score}`;
      nextBtn.classList.remove("hidden");
    }

    function nextQuestion() {
      currentQuestionIndex++;

      if (currentQuestionIndex < totalQuestions) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      quizScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");

      progressBar.style.width = "100%";
      finalScore.textContent = `${score}/${totalQuestions}`;

      if (score === 10) {
        motivationText.textContent = "Luar biasa! Kamu sangat hebat menghitung!";
      } else if (score >= 7) {
        motivationText.textContent = "Bagus sekali! Kamu sudah belajar dengan hebat!";
      } else if (score >= 4) {
        motivationText.textContent = "Keren! Terus berlatih ya, kamu pasti bisa!";
      } else {
        motivationText.textContent = "Terima kasih sudah belajar. Yuk coba lagi dengan semangat!";
      }
    }
  </script>
</body>
</html>
